      const [score, setScore] = useState(0);
      const [moduleScores, setModuleScores] = useState({});
      const [isQuizComplete, setIsQuizComplete] = useState(false);

      const currentQuestion = questionBank[currentQuestionIndex];

      const handleOptionSelect = (index) => {
        if (isAnswered) return;
        setSelectedOption(index);
        setIsAnswered(true);

        const isCorrect = index === currentQuestion.correctAnswer;
        if (isCorrect) setScore(score + 1);

        const module = currentQuestion.module;
        setModuleScores(prev => ({
          ...prev,
          [module]: {
            total: (prev[module]?.total || 0) + 1,
            correct: (prev[module]?.correct || 0) + (isCorrect ? 1 : 0)
          }
        }));
      };

      const handleNextQuestion = () => {
        if (currentQuestionIndex + 1 < questionBank.length) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
          setSelectedOption(null);
          setIsAnswered(false);
          setShowHint(false);
        } else {
          setIsQuizComplete(true);
        }
      };

      if (isQuizComplete) {
        return (
          <div className="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md mt-10">
            <h1 className="text-3xl font-bold mb-6 text-center text-blue-800">Review Complete</h1>
            <div className="text-center mb-6">
              <p className="text-2xl font-semibold">Final Score: {score} / {questionBank.length}</p>
            </div>
            <button 
              onClick={() => window.location.reload()} 
              className="mt-6 w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition"
            >
              Restart Exam
            </button>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto p-6 mt-4">
          <div className="flex justify-between items-center mb-6">
            <span className="text-sm font-semibold text-gray-500 uppercase tracking-wider">
              {currentQuestion.module}
            </span>
            <span className="text-sm font-bold bg-blue-100 text-blue-800 px-3 py-1 rounded-full">
              Question {currentQuestionIndex + 1} of {questionBank.length}
            </span>
          </div>

          <div className="bg-white rounded-lg shadow-md p-6 border-t-4 border-blue-600">
            <h2 className="text-xl font-medium text-gray-800 mb-6 leading-relaxed">
              {currentQuestion.text}
            </h2>

            <div className="space-y-3 mb-6">
              {currentQuestion.options.map((option, index) => {
                let buttonClass = "w-full text-left p-4 rounded border transition-all ";
                if (!isAnswered) buttonClass += "hover:bg-blue-50 hover:border-blue-300 border-gray-200 bg-white cursor-pointer";
                else if (index === currentQuestion.correctAnswer) buttonClass += "bg-green-100 border-green-500 text-green-900 font-medium";
                else if (index === selectedOption) buttonClass += "bg-red-100 border-red-500 text-red-900 line-through opacity-70";
                else buttonClass += "bg-gray-50 border-gray-200 text-gray-400 opacity-60";

                return (
                  <button
                    key={index}
                    disabled={isAnswered}
                    onClick={() => handleOptionSelect(index)}
                    className={buttonClass}
                  >
                    {String.fromCharCode(65 + index)}. {option}
                  </button>
                );
              })}
            </div>

            <div className="flex justify-between items-center pt-4 border-t border-gray-100">
              {!isAnswered && (
                <button 
                  onClick={() => setShowHint(!showHint)}
                  className="text-amber-600 text-sm font-medium hover:text-amber-800"
                >
                  💡 {showHint ? "Hide Hint" : "Need a Hint?"}
                </button>
              )}
              {isAnswered && (
                <button 
                  onClick={handleNextQuestion}
                  className="ml-auto bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition"
                >
                  {currentQuestionIndex + 1 === questionBank.length ? "Finish Exam" : "Next Question ➔"}
                </button>
              )}
            </div>

            {showHint && !isAnswered && (
              <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded text-amber-800 text-sm italic">
                {currentQuestion.hint}
              </div>
            )}

            {isAnswered && (
              <div className="mt-6 p-5 bg-blue-50 border border-blue-200 rounded-lg">
                <h3 className="font-bold text-blue-900 mb-2">Clinical Rationale:</h3>
                <p className="text-blue-800 leading-relaxed">{currentQuestion.rationale}</p>
              </div>
            )}
          </div>
          
          <div className="text-center mt-6 text-gray-500 font-medium">
            Current Score: {score} / {currentQuestionIndex + (isAnswered ? 1 : 0)}
          </div>
        </div>
      );
    }

    // Render the React application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ClinicalQuizApp />);
  </script>
</body>
</html>
